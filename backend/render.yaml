services:
  - type: web
    name: esg-analytics-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --config gunicorn.conf.py --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: esg-analytics-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://esg-analytics.vercel.app
      - key: DATABASE_PATH
        value: /opt/render/project/src/db.sqlite3
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: esg-db
      mountPath: /opt/render/project/src
      sizeGB: 1
    healthCheckPath: /api/